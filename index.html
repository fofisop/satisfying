<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sat</title>

<style>
.bubble-container {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    padding: 20px;
    justify-content: center;
}

.bubble {
    width: 60px;
    height: 60px;
    background: radial-gradient(circle at 30% 30%, white, cyan, blue);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.3s;
}

.bubble.pop {
    transform: scale(0);
    opacity: 0;
}

[data-tab-content] {
    display: none;
}

.active[data-tab-content] {
    display: block;
}

body {
    color: cyan;
    padding: 0;
    margin: 0;
    background-image: url(i.jpg);
}

.tabs {
    display: flex;
    justify-content: space-around;
    list-style-type: none;
    padding: 0;
    border: 5px solid cyan;
}

.tab {
    cursor: pointer;
    padding: 10px;
}

.tab.active {
    background-color: darkmagenta;
    border-bottom: 3px solid cyan;
}

.tab:hover {
    background-color: magenta;
}
.tile-container {
    display: grid;
    grid-template-columns: repeat(8, 40px);
    gap: 8px;
    justify-content: center;
    padding: 20px;
}

.tile {
    width: 40px;
    height: 40px;
    background: black;
    border: 2px solid cyan;
    transition: 0.2s;
    cursor: pointer;
}

.tile.fill {
    background: cyan;
    box-shadow: 0 0 10px cyan;
}


.flip-container{
    display: grid;
    grid-template-columns: repeat(8,50px);
    gap: 10px;
    justify-content: center;
    padding: 20px;
}
.flip-tile{
    width: 50px;
    height: 50px;
    background: magenta;
    border: 2px solid cyan;
    transition: transform 0.4s, background 0.3s;
    transform-style: preserve-3d;
}

.flip-tile.flip{
    transform: rotateY(180deg);
    background: linear-gradient(135deg, magenta, darkmagenta);
}


  
</style>
</head>

<body>

<ul class="tabs">
    <li data-tab-target="1" class="active tab">Bubbles</li>
    <li data-tab-target="2" class="tab">Tiles</li>
    <li data-tab-target="3" class="tab">Cards</li>
    <li data-tab-target="4" class="tab">4</li>
    <li data-tab-target="5" class="tab">5</li>
</ul>

<div class="tab-content">
    <div id="1" data-tab-content class="active">
        <h1>Bubble Pop</h1>
        <div class="bubble-container"></div>
        <button id="respawn">Respawn</button>
    </div>

    <div id="2" data-tab-content><h1>Tiles</h1>
    <div class="tile-container"></div><button onclick="makeTiles()">Reset Tiles</button></div>
    <div id="3" data-tab-content><h1>Cards</h1><div class="flip-container"></div></div>
    <div id="4" data-tab-content><h1>4</h1></div>
    <div id="5" data-tab-content><h1>5</h1></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const tabContents = document.querySelectorAll('[data-tab-content]');
    const tabs = document.querySelectorAll('[data-tab-target]');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = document.getElementById(tab.dataset.tabTarget);

            tabContents.forEach(tabContent => {
                tabContent.classList.remove('active');
            });
            tabs.forEach(t => t.classList.remove('active'));

            tab.classList.add('active');
            target.classList.add('active');
        });
        if (tab.dataset.tabTarget === "2") {
    makeTiles();
}
if (tab.dataset.tabTarget === "3") {
    makeFlipTiles();
}
    });

    const container = document.querySelector('.bubble-container');
    const respawnBtn = document.getElementById('respawn');

    function makeBubbles() {
        container.innerHTML = "";

        for (let i = 0; i < 20; i++) {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');

            bubble.onclick = () => {
                bubble.classList.add('pop');
                setTimeout(() => bubble.remove(), 300);
            };

            container.appendChild(bubble);
        }
    }

    makeBubbles();
    respawnBtn.onclick = makeBubbles;

});
function makeTiles() {
    const container = document.querySelector('.tile-container');
    container.innerHTML = "";

    for (let i = 0; i < 64; i++) {
        const tile = document.createElement('div');
        tile.className = "tile";

    tile.onclick = () => {
    const tiles = document.querySelectorAll('.tile');

    const index = Array.from(tiles).indexOf(tile);
    const cols = 8;

    const x = index % cols;
    const y = Math.floor(index / cols);

    tiles.forEach((t, i) => {
        const tx = i % cols;
        const ty = Math.floor(i / cols);

        const distance = Math.abs(tx - x) + Math.abs(ty - y);

        setTimeout(() => {
            t.classList.add('fill');
        }, distance * 110); 
    });
};

        container.appendChild(tile);
    }
}
function makeFlipTiles(){
    const container = document.querySelector('.flip-container');
    container.innerHTML = "";

    for (let i = 0; i < 64; i++) {
        const tile = document.createElement('div');
        tile.className = "flip-tile";
        tile.onclick = () => {
            const tiles =document.querySelectorAll('.flip-tile')
             const index = Array.from(tiles).indexOf(tile);
            const cols = 8;

            const x = index % cols;
            const y = Math.floor(index / cols);

            tiles.forEach((t, i) => {
                const tx = i % cols;
                const ty = Math.floor(i / cols);
                const distance = Math.abs(tx - x) + Math.abs(ty - y);

                setTimeout(() => {
                    t.classList.toggle('flip');
                }, distance * 100);
            });
        };

        container.appendChild(tile);
    }
}
        

</script>

</body>
</html>

<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sat</title>
    <style>
        .bubble-container {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    padding: 20px;
    justify-content: center;
}
.card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 20px;
}
.card.flip {
    transform: scaleX(-1);
    background: linear-gradient(135deg, magenta, purple);
}
.card {
    width: 60px;
    height: 90px;
    background: linear-gradient(135deg, white, lightgray); /* brighter */
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.3s, background 0.3s;

    border: 2px solid cyan;       
    box-shadow: 0 0 15px cyan;    
}


.bubble {
    width: 60px;
    height: 60px;
    background: radial-gradient(circle at 30% 30%, white, cyan, blue);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.3s;
}

.bubble.pop {
    transform: scale(0);
    opacity: 0;
}
        [data-tab-content] {
            display: none;
        }
        .active[data-tab-content] {
            display: block;
        }
        body {
            color: cyan;
            padding: 0;
            margin: 0;
            background-image: url(i.jpg) ;
        }
    .tabs {
            display: flex;
            justify-content: space-around;
    list-style-type: none;
            padding: 0;
            border: 5px solid cyan;
      }
 .tab {
    
    cursor: pointer;
     padding: 10px;
        }
        .tab.active {
            background-color:  darkmagenta;
            border-bottom: 3px solid cyan;
        }
        .tab:hover {
            background-color: magenta;
        }
    </style>
</head>
<body>
    <ul class="tabs">
        <li data-tab-target="1" class="active tab">Bubbles</li>
        <li data-tab-target="2" class="tab">Cards</li>
        <li data-tab-target="3" class="tab">3</li>
        <li data-tab-target="4" class="tab">4</li>
        <li data-tab-target="5" class="tab">5</li>
    </ul>

   
    <div class="tab-content">
       <div id="1" data-tab-content class="active">
    <h1>Bubble Pop</h1>
    <div class="bubble-container"></div>
    <button id="respawn">Respawn</button>
</div>



        <div id="2" data-tab-content><h1>Cards</h1><div class="card-container"></div></div>
        <div id="3" data-tab-content><h1>3</h1></div>
        <div id="4" data-tab-content><h1>4</h1></div>
        <div id="5" data-tab-content><h1>5</h1></div>
    </div>

    <script>
        const tabContents = document.querySelectorAll('[data-tab-content]');
        const tabs = document.querySelectorAll('[data-tab-target]');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
  
                const target = document.getElementById(tab.dataset.tabTarget);

               
                tabContents.forEach(tabContent => {
                    tabContent.classList.remove('active');
                });
                tabs.forEach(tab => {
        tab.classList.remove('active');
                });

            
        tab.classList.add('active');
        target.classList.add('active');
        if (tab.dataset.tabTarget === "2") makeCards();
            });
        });
        const container = document.querySelector('.bubble-container');
const respawnBtn = document.getElementById('respawn');


function makeBubbles() {
    container.innerHTML = ""; 

    for (let i = 0; i < 20; i++) {
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');

        bubble.onclick = () => {
            bubble.classList.add('pop');
            setTimeout(() => bubble.remove(), 300);
        };

        container.appendChild(bubble);
    }
}


makeBubbles();


respawnBtn.onclick = makeBubbles;



function makeCards() {
    const container2 = document.querySelector('#2 .card-container');
    container2.innerHTML = ""; 

    for (let i = 0; i < 20; i++) {
        let card = document.createElement('div');
        card.className = "card";

        card.onclick = () => {
            document.querySelectorAll('#2 .card').forEach((c, i) => {
                setTimeout(() => c.classList.toggle('flip'), i * 50);
            });
        };

        container2.appendChild(card);
    }
}
makeCards();


    </script>
</body>
</html>
